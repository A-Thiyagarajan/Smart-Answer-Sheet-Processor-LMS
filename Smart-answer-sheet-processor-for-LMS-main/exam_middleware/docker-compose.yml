version: '3.8'

# Production-optimized Docker Compose Configuration
# For development, use: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
# For production, use: docker-compose -f docker-compose.yml up

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: exam_middleware_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error - POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-exam_middleware}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - exam_network
    restart: unless-stopped
    # Resource limits for production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

  # Redis Cache & Session Store
  redis:
    image: redis:7-alpine
    container_name: exam_middleware_redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - exam_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Exam Middleware FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: exam_middleware_app
    environment:
      - DEBUG=False
      - ENVIRONMENT=production
      - HOST=0.0.0.0
      - PORT=8000
      - DATABASE_MODE=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?error - POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=${POSTGRES_DB:-exam_middleware}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - SECRET_KEY=${SECRET_KEY:?error - SECRET_KEY must be set}
      - MOODLE_BASE_URL=${MOODLE_BASE_URL:?error - MOODLE_BASE_URL must be set}
      - MOODLE_ADMIN_TOKEN=${MOODLE_ADMIN_TOKEN:?error - MOODLE_ADMIN_TOKEN must be set}
      - MOCK_LMS_ENABLED=False
      - LOG_LEVEL=WARNING
      - CORS_ORIGINS=${CORS_ORIGINS:-["http://localhost:8000"]}
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - exam_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    # Production: Do NOT mount code volumes
    # For development, see docker-compose.dev.yml

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  exam_network:
    driver: bridge

